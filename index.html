<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Spot Daily Open Strategy</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 400px; padding: 10px; }
        .header-box { background: #1e1e1e; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 10px; border: 1px solid #333; }
        h2 { margin: 0; color: #f1c40f; font-size: 1.5rem; }
        .status { font-size: 0.85rem; color: #888; margin-top: 5px; }
        .live-price { font-size: 1.4rem; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; font-size: 14px; }
        th, td { border: 1px solid #ccc; padding: 12px 5px; text-align: center; font-weight: bold; }
        
        .up-zone { background-color: #d1e7dd; } 
        .down-zone { background-color: #f8d7da; }
        .pivot-zone { 
            background-color: #87ceeb !important; 
            height: 60px;
            font-size: 1.1rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>XAU/USD (Gold Spot)</h2>
        <div id="live-val" class="live-price">Loading...</div>
        <div id="open-val" class="status">ราคาเปิดวันนี้: --.--</div>
        <div id="update-time" class="status">กำลังอัพเดท...</div>
    </div>

    <table>
        <thead>
            <tr style="background: #eeeeee;">
                <th width="30%">Target %</th>
                <th width="40%">Price ($)</th>
                <th width="30%">Points</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const steps = [4, 3.78, 3.5, 3.27, 3, 2.78, 2.5, 2.27, 2, 1.62, 1.41, 1.27, 1, 0.78, 0.61, 0.5, 0.38, 0.23];

    async function fetchGoldData() {
        try {
            // ดึงข้อมูล K-Line (แท่งเทียน) ราย 1 วัน เพื่อหาค่า Open ที่แท้จริง
            const klineRes = await fetch('https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=1d&limit=1');
            const klineData = await klineRes.json();
            
            // ข้อมูลแท่งล่าสุด: [0]Open time, [1]Open, [2]High, [3]Low, [4]Close...
            const openPrice = parseFloat(klineData[0][1]);
            const currentPrice = parseFloat(klineData[0][4]); // ราคาล่าสุดคือราคา Close ของแท่งปัจจุบัน

            // อัพเดทหน้าจอ
            document.getElementById('live-val').innerText = `$${currentPrice.toFixed(2)}`;
            document.getElementById('open-val').innerText = `ราคาเปิดตลาด (Daily Open): $${openPrice.toFixed(2)}`;
            document.getElementById('update-time').innerText = `อัพเดทล่าสุด: ${new Date().toLocaleTimeString()}`;

            renderTable(openPrice);
        } catch (error) {
            console.error("API Error:", error);
            document.getElementById('live-val').innerText = "Connection Error";
        }
    }

    function renderTable(open) {
        const body = document.getElementById('tableBody');
        let rows = '';

        // โซนด้านบน (ราคาเปิด + %)
        steps.forEach(p => {
            const pPrice = open + (open * (p / 100));
            const diff = pPrice - open;
            rows += `<tr class="up-zone"><td>+${p}%</td><td>${pPrice.toFixed(2)}</td><td>+${diff.toFixed(2)}</td></tr>`;
        });

        // ช่องสีฟ้า (ราคาเปิดวันนี้)
        const d = new Date();
        const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
        rows += `<tr class="pivot-zone">
                    <td>OPEN<br><small>${dateStr}</small></td>
                    <td>${open.toFixed(2)}</td>
                    <td>PIVOT</td>
                 </tr>`;

        // โซนด้านล่าง (ราคาเปิด - %)
        [...steps].reverse().forEach(p => {
            const pPrice = open - (open * (p / 100));
            const diff = open - pPrice;
            rows += `<tr class="down-zone"><td>-${p}%</td><td>${pPrice.toFixed(2)}</td><td>-${diff.toFixed(2)}</td></tr>`;
        });

        body.innerHTML = rows;
    }

    // เรียกครั้งแรก
    fetchGoldData();
    // อัพเดทราคาล่าสุดทุก 30 วินาที
    setInterval(fetchGoldData, 30000);
</script>

</body>
</html>
