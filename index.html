<script>
    // ตั้งค่า % ที่ต้องการแสดง
    const percentages = [4, 3.78, 3.5, 3.27, 3, 2.78, 2.5, 2.27, 2, 1.62, 1.41, 1.27, 1, 0.78, 0.61, 0.5, 0.38, 0.23];

    async function fetchGoldData() {
        try {
            // ดึงข้อมูล Ticker 24 ชม. ของ PAXG/USDT (ทองคำ)
            // ตัวแปร openPrice ใน API นี้คือราคาเปิดเมื่อ 24 ชม. ที่แล้วนับจากวินาทีนี้
            const response = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
            const data = await response.json();
            
            // ราคาเปิดของรอบวัน (Open Price)
            const openPrice = parseFloat(data.openPrice); 
            // ราคาล่าสุด (เพื่อแสดงสถานะด้านบน)
            const currentPrice = parseFloat(data.lastPrice);
            
            const today = new Date();
            const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear() + 543}`; // แสดงเป็น พ.ศ. ตามภาพ

            renderTable(openPrice, dateStr);
            
            document.getElementById('status').innerHTML = `
                ราคาเปิดตลาดวันนี้: <span style="color:blue">$${openPrice.toFixed(2)}</span><br>
                <small>ราคาล่าสุดขณะนี้: $${currentPrice.toFixed(2)}</small>
            `;
        } catch (error) {
            document.getElementById('status').innerText = "ไม่สามารถโหลดข้อมูลได้";
            console.error(error);
        }
    }

    function renderTable(openPrice, dateStr) {
        const body = document.getElementById('tableBody');
        let html = '';

        // 1. คำนวณโซนด้านบน (ราคาเปิด + %) - เรียงจาก % มากไปน้อย
        percentages.forEach(p => {
            const price = openPrice + (openPrice * (p / 100));
            const diff = price - openPrice;
            html += `<tr class="up-zone">
                        <td>${p}%</td>
                        <td>${price.toFixed(2)}</td>
                        <td>${diff.toFixed(2)}</td>
                    </tr>`;
        });

        // 2. แถวกลาง (ราคาเปิดตลาด - ช่องสีฟ้า)
        html += `<tr class="pivot-zone">
                    <td>${dateStr}</td>
                    <td>${openPrice.toFixed(2)}</td>
                    <td></td>
                </tr>`;

        // 3. คำนวณโซนด้านล่าง (ราคาเปิด - %) - เรียงจาก % น้อยไปมากตามภาพ
        [...percentages].reverse().forEach(p => {
            const price = openPrice - (openPrice * (p / 100));
            const diff = openPrice - price;
            html += `<tr class="down-zone">
                        <td>${p}%</td>
                        <td>${price.toFixed(2)}</td>
                        <td>${diff.toFixed(2)}</td>
                    </tr>`;
        });

        body.innerHTML = html;
    }

    // เรียกทำงานทันทีที่เปิดหน้าเว็บ
    fetchGoldData();
    
    // อัปเดตข้อมูลทุกๆ 5 นาที (หรือตามต้องการ) เพื่อเช็คเผื่อข้ามวัน
    setInterval(fetchGoldData, 300000);
</script>
