<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Range Calculator</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        table { border-collapse: collapse; width: 300px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #444; padding: 8px; font-weight: bold; }
        
        /* สีตามภาพ */
        .up-zone { background-color: #d1e7dd; } /* เขียวอ่อน */
        .pivot-zone { background-color: #87ceeb; border: 2px solid #000; } /* ฟ้า */
        .down-zone { background-color: #f8d7da; } /* แดงอ่อน */
        
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2>Gold Price Real-time</h2>
    <div id="status" class="loading">กำลังโหลดราคาล่าสุด...</div>
    <br>

    <table id="goldTable">
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        // ตั้งค่า % ที่ต้องการแสดง (เรียงจากมากไปน้อย)
        const percentages = [4, 3.78, 3.5, 3.27, 3, 2.78, 2.5, 2.27, 2, 1.62, 1.41, 1.27, 1, 0.78, 0.61, 0.5, 0.38, 0.23];

        async function fetchGoldPrice() {
            try {
                // ใช้ API จาก Binance (ฟรีและไม่ต้องใช้ Key สำหรับข้อมูลสาธารณะ)
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
                const data = await response.json();
                
                const openPrice = parseFloat(data.openPrice); // ราคาเปิด 24 ชม. ที่แล้ว
                const currentPrice = parseFloat(data.lastPrice);
                const today = new Date().toLocaleDateString('th-TH');

                renderTable(openPrice, today);
                document.getElementById('status').innerText = `ราคาปัจจุบัน: $${currentPrice.toFixed(2)}`;
            } catch (error) {
                document.getElementById('status').innerText = "โหลดข้อมูลล้มเหลว กรุณารีเฟรชหน้าจอ";
                console.error(error);
            }
        }

        function renderTable(openPrice, dateStr) {
            const body = document.getElementById('tableBody');
            let html = '';

            // 1. โซนราคาบวก (สีเขียว)
            percentages.forEach(p => {
                const price = openPrice + (openPrice * (p / 100));
                const diff = price - openPrice;
                html += `<tr class="up-zone"><td>${p}%</td><td>${price.toFixed(2)}</td><td>${diff.toFixed(2)}</td></tr>`;
            });

            // 2. ราคาเปิด (สีฟ้า)
            html += `<tr class="pivot-zone"><td>${dateStr}</td><td>${openPrice.toFixed(2)}</td><td></td></tr>`;

            // 3. โซนราคาลบ (สีแดง)
            [...percentages].reverse().forEach(p => {
                const price = openPrice - (openPrice * (p / 100));
                const diff = openPrice - price;
                html += `<tr class="down-zone"><td>${p}%</td><td>${price.toFixed(2)}</td><td>${diff.toFixed(2)}</td></tr>`;
            });

            body.innerHTML = html;
        }

        fetchGoldPrice();
        // อัพเดททุก 1 นาที
        setInterval(fetchGoldPrice, 60000);
    </script>
</body>
</html>
