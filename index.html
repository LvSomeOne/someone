<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Strategy Table</title>
    <style>
        :root {
            --blue-pivot: #87ceeb;
            --green-bg: #d1e7dd;
            --red-bg: #f8d7da;
            --border-color: #444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #333;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .price-info {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #ffcc00;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
            color: #000;
            font-size: 14px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px 5px;
            text-align: center;
            font-weight: bold;
        }

        th { background-color: #eee; }

        /* สีตามโซนที่ต้องการ */
        .up-zone { background-color: var(--green-bg); }
        .down-zone { background-color: var(--red-bg); }
        .pivot-zone { 
            background-color: var(--blue-pivot); 
            font-size: 16px;
            height: 50px;
        }

        .loading-overlay {
            color: #aaa;
            font-style: italic;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Gold (XAU/USD) Range</h2>
        <div id="status" class="loading-overlay">กำลังดึงข้อมูลจากตลาด...</div>
        <div id="live-price" class="price-info">--.--</div>
    </header>

    <table>
        <thead>
            <tr>
                <th>% Change</th>
                <th>Price ($)</th>
                <th>Points Diff</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // รายชื่อ % ที่ต้องการ (อ้างอิงตามรูปภาพที่คุณส่งมา)
    const steps = [4, 3.78, 3.5, 3.27, 3, 2.78, 2.5, 2.27, 2, 1.62, 1.41, 1.27, 1, 0.78, 0.61, 0.5, 0.38, 0.23];

    async function updateGoldData() {
        try {
            // ใช้ API จาก Binance ดึงข้อมูลคู่ PAXGUSDT (Gold Spot Token)
            const response = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
            const data = await response.json();

            // ดึงราคาเปิด (Open Price) ของรอบ 24 ชม.
            const openPrice = parseFloat(data.openPrice);
            // ดึงราคาล่าสุด (Last Price)
            const lastPrice = parseFloat(data.lastPrice);
            
            // อัปเดตการแสดงผลราคาล่าสุดด้านบน
            document.getElementById('live-price').innerText = `Live: $${lastPrice.toFixed(2)}`;
            document.getElementById('status').innerText = `Updated: ${new Date().toLocaleTimeString()}`;

            renderTable(openPrice);
        } catch (error) {
            document.getElementById('status').innerText = "Error: ไม่สามารถเชื่อมต่อ API ได้";
            console.error(error);
        }
    }

    function renderTable(openPrice) {
        const body = document.getElementById('tableBody');
        let rows = '';

        // 1. ส่วนบน: ราคาที่ + เพิ่มขึ้นจากราคาเปิด
        steps.forEach(p => {
            const calculatedPrice = openPrice + (openPrice * (p / 100));
            const diff = calculatedPrice - openPrice;
            rows += `<tr class="up-zone">
                        <td>+${p}%</td>
                        <td>${calculatedPrice.toFixed(2)}</td>
                        <td>+${diff.toFixed(2)}</td>
                    </tr>`;
        });

        // 2. ส่วนกลาง: ราคาเปิดของวัน (ช่องสีฟ้า)
        const now = new Date();
        const dateDisplay = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear() + 543}`;
        rows += `<tr class="pivot-zone">
                    <td>OPEN<br><small>${dateDisplay}</small></td>
                    <td style="font-size: 20px;">${openPrice.toFixed(2)}</td>
                    <td>PIVOT</td>
                </tr>`;

        // 3. ส่วนล่าง: ราคาที่ - ลดลงจากราคาเปิด (เรียงจาก % น้อยไปมาก)
        const reversedSteps = [...steps].reverse();
        reversedSteps.forEach(p => {
            const calculatedPrice = openPrice - (openPrice * (p / 100));
            const diff = openPrice - calculatedPrice;
            rows += `<tr class="down-zone">
                        <td>-${p}%</td>
                        <td>${calculatedPrice.toFixed(2)}</td>
                        <td>-${diff.toFixed(2)}</td>
                    </tr>`;
        });

        body.innerHTML = rows;
    }

    // เริ่มทำงานทันที
    updateGoldData();

    // อัปเดตราคาล่าสุดทุกๆ 30 วินาที เพื่อให้ตัวเลข Live Price ขยับ
    // แต่ตารางจะยังยึดราคา Open ของวันเป็นหลัก
    setInterval(updateGoldData, 30000);
</script>

</body>
</html>
